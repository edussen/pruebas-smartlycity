<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOFIA - Vision AI Analizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .winner-card { 
            border: 4px solid #10b981 !important; 
            transform: scale(1.05); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            z-index: 10;
        }
        .error-card { border: 2px solid #ef4444 !important; background: #fef2f2; }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        img { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10 animate__animated animate__fadeIn">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">SOFIA <span class="text-blue-600">Vision AI</span></h1>
            <p class="text-slate-600 font-medium">Escanea en tiempo real o sube imágenes para comparar</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-1 space-y-4">
                <div class="glass p-6 rounded-2xl shadow-sm border border-white">
                    <h3 class="font-bold mb-4 text-slate-700 flex items-center justify-between">
                        <span><span class="mr-2">🎯</span> Imagen Base</span>
                        <button onclick="abrirCamara()" class="bg-slate-800 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-slate-700 flex items-center transition-colors">
                            📷 Usar Cámara
                        </button>
                    </h3>
                    
                    <label class="text-xs font-bold text-slate-400 uppercase">Token D1</label>
                    <input type="password" id="token" value="bXJsdWtpNDY1NkBnbWFpbC5jb206MTc3NTM2NDM2MzczMA==" placeholder="Tu token de acceso" class="w-full p-3 rounded-xl border border-slate-200 mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
                    
                    <div id="cameraModule" class="hidden mb-4 animate__animated animate__fadeIn">
                        <video id="webcam" class="w-full h-48 object-cover rounded-xl bg-black" autoplay playsinline></video>
                        <button onclick="tomarFoto()" class="w-full mt-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 rounded-xl transition-colors">
                            📸 Capturar Foto
                        </button>
                        <canvas id="canvas" class="hidden"></canvas>
                    </div>

                    <div id="previewContainer" class="hidden relative mb-4">
                        <img id="cameraPreview" class="w-full h-48 object-cover rounded-xl border-2 border-emerald-400">
                        <button onclick="borrarFoto()" class="absolute top-2 right-2 bg-red-500 text-white text-xs px-2 py-1 rounded shadow">X Quitar</button>
                    </div>
                    
                    <div id="inputsTradicionales">
                        <label class="text-xs font-bold text-slate-400 uppercase mb-1 block">O usa Link / Archivo</label>
                        <input type="text" id="targetUrl" value="https://http2.mlstatic.com/D_NQ_NP_2X_811369-MCO89842965860_082025-T.webp" class="w-full p-3 rounded-xl border-2 border-blue-200 outline-none mb-2" placeholder="Pega una URL">
                        <input type="file" id="targetFile" accept="image/*" class="w-full text-xs file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 cursor-pointer">
                    </div>
                </div>
                
                <button onclick="analizarImagenes()" id="btnAnalizar" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all transform hover:-translate-y-1 active:scale-95">
                    Analizar Similitud
                </button>
            </div>

            <div class="lg:col-span-2 glass p-6 rounded-2xl shadow-sm border border-white">
                <h3 class="font-bold mb-4 text-slate-700 flex items-center">
                    <span class="mr-2">📦</span> Opciones a Comparar
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
                        <span class="text-xs font-bold text-slate-400 mb-2 block">OPCIÓN #1</span>
                        <input type="text" id="url0" value="http://imagenes.numart.com.co/genericproduct.png" class="w-full p-2 rounded-lg border border-slate-200 outline-none text-xs mb-2">
                        <input type="file" id="file0" accept="image/*" class="w-full text-xs file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:bg-slate-200 file:text-slate-700 cursor-pointer">
                    </div>
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
                        <span class="text-xs font-bold text-slate-400 mb-2 block">OPCIÓN #2</span>
                        <input type="text" id="url1" value="http://imagenes.numart.com.co/genericproduct2.png" class="w-full p-2 rounded-lg border border-slate-200 outline-none text-xs mb-2">
                        <input type="file" id="file1" accept="image/*" class="w-full text-xs file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:bg-slate-200 file:text-slate-700 cursor-pointer">
                    </div>
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
                        <span class="text-xs font-bold text-slate-400 mb-2 block">OPCIÓN #3</span>
                        <input type="text" id="url2" value="http://imagenes.numart.com.co/genericproduct3.png" class="w-full p-2 rounded-lg border border-slate-200 outline-none text-xs mb-2">
                        <input type="file" id="file2" accept="image/*" class="w-full text-xs file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:bg-slate-200 file:text-slate-700 cursor-pointer">
                    </div>
                </div>
            </div>
        </div>

        <div id="loading" class="hidden flex flex-col items-center py-10 animate__animated animate__fadeIn">
            <div class="loader w-12 h-12 border-4 border-blue-500 rounded-full mb-4"></div>
            <p class="text-slate-600 font-bold animate-pulse">Codificando tensores visuales con SOFIA...</p>
        </div>

        <div id="resultadoArea" class="hidden animate__animated animate__fadeInUp">
            <div class="bg-white border-l-8 border-emerald-500 p-6 rounded-2xl shadow-sm mb-8 transition-colors" id="cajaExplicacion">
                <h2 class="text-xl font-bold text-slate-800 mb-1" id="tituloResultado">Resultado del Análisis</h2>
                <p id="explicacionIA" class="text-emerald-700 italic leading-relaxed"></p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="gridCartas"></div>
        </div>
    </div>

    <script>
        // --- LÓGICA DE LA CÁMARA EN TIEMPO REAL ---
        let stream = null;
        let fotoCapturadaBase64 = null;

        async function abrirCamara() {
            const video = document.getElementById('webcam');
            const cameraModule = document.getElementById('cameraModule');
            const inputsTradicionales = document.getElementById('inputsTradicionales');
            const previewContainer = document.getElementById('previewContainer');

            // 1. Verificación de seguridad del navegador (HTTPS / Localhost)
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("⚠️ El navegador bloqueó la cámara. Para que te pida permisos, debes estar usando un servidor seguro (HTTPS) o localhost.");
                return;
            }

            cameraModule.classList.remove('hidden');
            inputsTradicionales.classList.add('hidden');
            previewContainer.classList.add('hidden');

            try {
                // 2. Aquí es donde lanza la ventana de permisos al usuario
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                
                // Conectamos el video y forzamos que se reproduzca
                video.srcObject = stream;
                await video.play();

            } catch (err) {
                console.error("Detalle del error de cámara:", err);
                
                // 3. Manejo de errores específicos para guiar al usuario
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    alert("❌ Permiso denegado. Has bloqueado el acceso a la cámara. Debes ir al candado 🔒 en la barra de direcciones de tu navegador y permitirlo manualmente.");
                } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                    alert("❌ No se detectó ninguna cámara conectada a este dispositivo.");
                } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                    alert("❌ La cámara ya está siendo usada por otra aplicación (como Zoom o Meet). Cierra la otra app e intenta de nuevo.");
                } else {
                    alert("❌ Ocurrió un error al intentar pedir los permisos. \nRecuerda: si abriste el archivo con doble clic (file://), la cámara no funcionará por seguridad. Usa un servidor local.");
                }
                
                borrarFoto(); // Restaurar la interfaz si falla
            }
        }
        function tomarFoto() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('canvas');
            const previewContainer = document.getElementById('previewContainer');
            const cameraPreview = document.getElementById('cameraPreview');
            const cameraModule = document.getElementById('cameraModule');

            // Dibujar el fotograma en un canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

            // Convertir a Base64 (JPG comprimido al 80% para que sea rápido)
            fotoCapturadaBase64 = canvas.toDataURL('image/jpeg', 0.8);

            // Mostrar previsualización
            cameraPreview.src = fotoCapturadaBase64;
            previewContainer.classList.remove('hidden');
            cameraModule.classList.add('hidden');

            // Apagar la cámara para ahorrar batería
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        function borrarFoto() {
            fotoCapturadaBase64 = null;
            document.getElementById('previewContainer').classList.add('hidden');
            document.getElementById('cameraModule').classList.add('hidden');
            document.getElementById('inputsTradicionales').classList.remove('hidden');
            if (stream) stream.getTracks().forEach(track => track.stop());
        }

        // --- LÓGICA DE PROCESAMIENTO ---
        const getSourceData = async (urlId, fileId) => {
            const fileInput = document.getElementById(fileId);
            if (fileInput && fileInput.files.length > 0) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                    reader.readAsDataURL(fileInput.files[0]);
                });
            }
            return document.getElementById(urlId) ? document.getElementById(urlId).value : null;
        };

        async function analizarImagenes() {
            const btn = document.getElementById('btnAnalizar');
            const loader = document.getElementById('loading');
            const resArea = document.getElementById('resultadoArea');
            const cajaExplicacion = document.getElementById('cajaExplicacion');
            const tituloResultado = document.getElementById('tituloResultado');
            const explicacion = document.getElementById('explicacionIA');
            const grid = document.getElementById('gridCartas');
            const token = document.getElementById('token').value;

            if(!token) return alert("⚠️ El token es obligatorio.");

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');
            grid.innerHTML = "";

            try {
                // PRIORIDAD: 1. Foto de la cámara en vivo | 2. Archivo subido | 3. URL de texto
                let targetData = fotoCapturadaBase64; 
                if (!targetData) {
                    targetData = await getSourceData('targetUrl', 'targetFile');
                }

                const cand0 = await getSourceData('url0', 'file0');
                const cand1 = await getSourceData('url1', 'file1');
                const cand2 = await getSourceData('url2', 'file2');

                const data = {
                    token: token,
                    targetUrl: targetData,
                    candidates: [cand0, cand1, cand2]
                };

                // PON TU WORKER AQUÍ
                const response = await fetch('https://sofia-image.mrluki4656.workers.dev/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const res = await response.json();

                if (!res.success) throw new Error(res.error || "Error en la IA.");

                if (!res.ganadora) {
                    cajaExplicacion.classList.replace('border-emerald-500', 'border-amber-500');
                    explicacion.classList.replace('text-emerald-700', 'text-amber-700');
                    tituloResultado.innerText = "Ninguna coincidencia válida";
                    explicacion.innerHTML = `⭐ <b>Mensaje de Sistema:</b> "Ninguna de las opciones supera el umbral de similitud. Parecen productos distintos."`;
                } else {
                    cajaExplicacion.classList.replace('border-amber-500', 'border-emerald-500');
                    explicacion.classList.replace('text-amber-700', 'text-emerald-700');
                    tituloResultado.innerText = "Análisis de SOFIA completado";
                    const score = (res.ganadora.similarity * 100).toFixed(1);
                    explicacion.innerHTML = `⭐ <b>Mensaje de Sistema:</b> "La <b>Opción #${res.ganadora.index + 1}</b> es la más parecida (${score}%). ${score > 85 ? 'Prácticamente idénticos.' : 'Es la aproximación más cercana.'}"`;
                }

                grid.innerHTML = res.todos_los_resultados.map((item, i) => {
                    const esGanadora = res.ganadora && i === res.ganadora.index;
                    return `
                    <div class="glass p-4 rounded-2xl border transition-all animate__animated animate__zoomIn ${esGanadora ? 'winner-card bg-emerald-50' : 'opacity-80 scale-95'} ${item.error ? 'error-card' : ''}">
                        <div class="relative overflow-hidden rounded-xl mb-4 h-48 bg-slate-200">
                            <img src="${item.url}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400?text=Error'">
                            ${esGanadora ? '<span class="absolute top-2 right-2 bg-emerald-500 text-white px-3 py-1 rounded-full text-xs font-bold uppercase shadow-md">Match</span>' : ''}
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between items-center text-xs font-bold uppercase">
                                <span class="text-slate-500">Opción ${i+1}</span>
                                <span class="${esGanadora ? 'text-emerald-600' : 'text-blue-500'} font-mono text-base">${(item.similarity * 100).toFixed(1)}%</span>
                            </div>
                            <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                                <div class="${esGanadora ? 'bg-emerald-500' : 'bg-blue-400'} h-full transition-all" style="width: ${item.similarity * 100}%"></div>
                            </div>
                            ${item.error ? `<p class="text-[10px] text-red-500 font-bold text-center mt-2">⚠️ ${item.error}</p>` : ''}
                        </div>
                    </div>
                `}).join('');

                resArea.classList.remove('hidden');

            } catch (err) {
                alert("❌ ERROR: " + err.message);
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
