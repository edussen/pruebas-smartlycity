<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOFIA - Vision AI Analizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .winner-card { 
            border: 4px solid #10b981 !important; 
            transform: scale(1.05); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            z-index: 10;
        }
        .error-card { border: 2px solid #ef4444 !important; background: #fef2f2; }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        img { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10 animate__animated animate__fadeIn">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">SOFIA <span class="text-blue-600">Vision AI</span></h1>
            <p class="text-slate-600 font-medium">Escanea en tiempo real o sube imágenes para comparar</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-1 space-y-4">
                <div class="glass p-6 rounded-2xl shadow-sm border border-white">
                    <h3 class="font-bold mb-4 text-slate-700 flex items-center justify-between">
                        <span><span class="mr-2">🎯</span> Imagen Base</span>
                        <button onclick="abrirCamara()" class="bg-slate-800 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-slate-700 flex items-center transition-colors">
                            📷 Cámara
                        </button>
                    </h3>
                    
                    <label class="text-xs font-bold text-slate-400 uppercase">Token D1</label>
                    <input type="password" id="token" value="bXJsdWtpNDY1NkBnbWFpbC5jb206MTc3NTM2NDM2MzczMA==" class="w-full p-3 rounded-xl border border-slate-200 mb-4 outline-none">
                    
                    <div id="cameraModule" class="hidden mb-4 animate__animated animate__fadeIn">
                        <video id="webcam" class="w-full h-48 object-cover rounded-xl bg-black" autoplay playsinline></video>
                        <button onclick="tomarFoto()" class="w-full mt-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 rounded-xl transition-colors">
                            📸 Capturar Foto
                        </button>
                        <canvas id="canvas" class="hidden"></canvas>
                    </div>

                    <div id="previewContainer" class="hidden relative mb-4">
                        <img id="cameraPreview" class="w-full h-48 object-cover rounded-xl border-2 border-emerald-400">
                        <button onclick="borrarFoto()" class="absolute top-2 right-2 bg-red-500 text-white text-xs px-2 py-1 rounded shadow">X Quitar</button>
                    </div>
                    
                    <div id="inputsTradicionales">
                        <label class="text-xs font-bold text-slate-400 uppercase mb-1 block">O usa Link / Archivo</label>
                        <input type="text" id="targetUrl" value="https://http2.mlstatic.com/D_NQ_NP_2X_811369-MCO89842965860_082025-T.webp" class="w-full p-3 rounded-xl border-2 border-blue-200 outline-none mb-2">
                        <input type="file" id="targetFile" accept="image/*" class="w-full text-xs file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 cursor-pointer">
                    </div>
                </div>
                
                <button onclick="analizarImagenes()" id="btnAnalizar" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all transform hover:-translate-y-1 active:scale-95">
                    Analizar Similitud
                </button>
            </div>

            <div class="lg:col-span-2 glass p-6 rounded-2xl shadow-sm border border-white">
                <h3 class="font-bold mb-4 text-slate-700 flex items-center">
                    <span class="mr-2">📦</span> Opciones a Comparar
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
                        <span class="text-xs font-bold text-slate-400 mb-2 block">OPCIÓN #1</span>
                        <input type="text" id="url0" value="http://imagenes.numart.com.co/genericproduct.png" class="w-full p-2 rounded-lg border border-slate-200 outline-none text-xs mb-2">
                        <input type="file" id="file0" accept="image/*" class="w-full text-xs file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:bg-slate-200 file:text-slate-700 cursor-pointer">
                    </div>
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
                        <span class="text-xs font-bold text-slate-400 mb-2 block">OPCIÓN #2</span>
                        <input type="text" id="url1" value="http://imagenes.numart.com.co/genericproduct2.png" class="w-full p-2 rounded-lg border border-slate-200 outline-none text-xs mb-2">
                        <input type="file" id="file1" accept="image/*" class="w-full text-xs file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:bg-slate-200 file:text-slate-700 cursor-pointer">
                    </div>
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
                        <span class="text-xs font-bold text-slate-400 mb-2 block">OPCIÓN #3</span>
                        <input type="text" id="url2" value="http://imagenes.numart.com.co/genericproduct3.png" class="w-full p-2 rounded-lg border border-slate-200 outline-none text-xs mb-2">
                        <input type="file" id="file2" accept="image/*" class="w-full text-xs file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:bg-slate-200 file:text-slate-700 cursor-pointer">
                    </div>
                </div>
            </div>
        </div>

        <div id="loading" class="hidden flex flex-col items-center py-10 animate__animated animate__fadeIn">
            <div class="loader w-12 h-12 border-4 border-blue-500 rounded-full mb-4"></div>
            <p class="text-slate-600 font-bold animate-pulse">Analizando con Llama 3.2 Vision...</p>
        </div>

        <div id="resultadoArea" class="hidden animate__animated animate__fadeInUp">
            <div class="bg-white border-l-8 border-emerald-500 p-6 rounded-2xl shadow-sm mb-8 transition-colors" id="cajaExplicacion">
                <h2 class="text-xl font-bold text-slate-800 mb-1" id="tituloResultado">Resultado del Análisis</h2>
                <p id="explicacionIA" class="text-emerald-700 italic leading-relaxed"></p>
                <p id="targetCaption" class="text-xs font-bold text-slate-400 mt-2 bg-slate-50 p-2 rounded block hidden"></p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="gridCartas"></div>
        </div>
    </div>

<script>
let stream = null;
let fotoCapturadaBase64 = null;

// ------------------ CÁMARA (AHORA COMPRIME LA FOTO) ------------------
async function abrirCamara() {
    const video = document.getElementById('webcam');
    document.getElementById('cameraModule').classList.remove('hidden');
    document.getElementById('inputsTradicionales').classList.add('hidden');

    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        await video.play();
    } catch (err) {
        alert("❌ Error con cámara. Asegúrate de dar permisos o usar HTTPS.");
        borrarFoto();
    }
}

function tomarFoto() {
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');

    // 🔥 Compresión agresiva para evitar el Timeout
    const MAX_WIDTH = 512;
    const scale = MAX_WIDTH / video.videoWidth;
    canvas.width = MAX_WIDTH;
    canvas.height = video.videoHeight * scale;

    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
    fotoCapturadaBase64 = canvas.toDataURL('image/jpeg', 0.7); // 70% calidad JPEG

    document.getElementById('cameraPreview').src = fotoCapturadaBase64;
    document.getElementById('previewContainer').classList.remove('hidden');
    document.getElementById('cameraModule').classList.add('hidden');

    if (stream) stream.getTracks().forEach(t => t.stop());
}

function borrarFoto() {
    fotoCapturadaBase64 = null;
    document.getElementById('previewContainer').classList.add('hidden');
    document.getElementById('inputsTradicionales').classList.remove('hidden');
    if (stream) stream.getTracks().forEach(t => t.stop());
}

// ------------------ OBTENER DATOS ------------------
const getSourceData = async (urlId, fileId) => {
    const fileInput = document.getElementById(fileId);
    if (fileInput && fileInput.files.length > 0) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(fileInput.files[0]);
        });
    }
    const url = document.getElementById(urlId)?.value?.trim();
    return url || null;
};

// ------------------ IA Y LLAMADA ------------------
// ... (manten todo igual arriba, reemplaza solo desde la función analizarImagenes)

async function analizarImagenes() {
    const btn = document.getElementById('btnAnalizar');
    const loader = document.getElementById('loading');
    const resArea = document.getElementById('resultadoArea');
    const explicacion = document.getElementById('explicacionIA');
    const titulo = document.getElementById('tituloResultado');
    const grid = document.getElementById('gridCartas');
    const targetCaptionBox = document.getElementById('targetCaption');
    const cajaExplicacion = document.getElementById('cajaExplicacion');

    btn.disabled = true;
    loader.classList.remove('hidden');
    resArea.classList.add('hidden');
    grid.innerHTML = "";
    
    // Restaurar base
    cajaExplicacion.className = "bg-white border-l-8 p-6 rounded-2xl shadow-sm mb-8 transition-colors";
    explicacion.className = "italic leading-relaxed font-medium";

    try {
        let targetData = fotoCapturadaBase64 || await getSourceData('targetUrl', 'targetFile');
        if (!targetData) throw new Error("⚠️ Necesitas proveer una imagen base.");

        const rawCandidates = [
            await getSourceData('url0', 'file0'),
            await getSourceData('url1', 'file1'),
            await getSourceData('url2', 'file2')
        ];

        const candidates = rawCandidates.filter(x => x && x.length > 10);
        if (candidates.length === 0) throw new Error("⚠️ Necesitas al menos un candidato válido.");

        const response = await fetch('https://sofia-image.mrluki4656.workers.dev/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ targetUrl: targetData, candidates: candidates })
        });

        if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
        const res = await response.json();
        if (!res.success) throw new Error(res.error);

        // ------------------ RENDERIZAR ÉXITO ------------------
        targetCaptionBox.classList.remove('hidden');
        targetCaptionBox.innerText = `👁️ La IA escaneó la base como: "${res.target_caption}"`;

        if (!res.ganadora) {
            cajaExplicacion.classList.add('border-red-500');
            explicacion.classList.add('text-red-700');
            titulo.innerText = "Sin coincidencias claras";
            explicacion.innerHTML = "⚠️ Los productos no se parecen lo suficiente a la imagen de referencia.";
        } else {
            const score = res.ganadora.similarity;
            const scoreStr = (score * 100).toFixed(1);
            
            // LÓGICA DE COLORES
            if (score >= 0.70) {
                // VERDE: Excelente Match
                cajaExplicacion.classList.add('border-emerald-500');
                explicacion.classList.add('text-emerald-700');
                titulo.innerText = "¡Match Exacto Encontrado!";
                explicacion.innerHTML = `✅ La mejor coincidencia es la Opción #${res.ganadora.index + 1} (${scoreStr}%).`;
            } else {
                // AMARILLO: Match Dudoso
                cajaExplicacion.classList.add('border-amber-400');
                explicacion.classList.add('text-amber-700');
                titulo.innerText = "Posible coincidencia (Baja similitud)";
                explicacion.innerHTML = `⚠️ La Opción #${res.ganadora.index + 1} es la más parecida (${scoreStr}%), pero existen diferencias notables.`;
            }
        }

        // RENDERIZAR CARTAS CON COLORES DINÁMICOS
        grid.innerHTML = res.todos_los_resultados.map((item, i) => {
            const win = res.ganadora && i === res.ganadora.index;
            const score = item.similarity;
            const scoreStr = (score * 100).toFixed(1);
            
            let cardStyle = 'opacity-80 border border-slate-200';
            let badge = '';
            let barColor = 'bg-blue-400';
            let textColor = 'text-blue-500';

            if (win) {
                if (score >= 0.70) {
                    cardStyle = 'border-4 border-emerald-500 bg-emerald-50 scale-105 shadow-xl z-10';
                    badge = '<span class="absolute top-2 right-2 bg-emerald-500 text-white px-3 py-1 rounded-full text-xs font-bold uppercase shadow-md">Match Seguro</span>';
                    barColor = 'bg-emerald-500';
                    textColor = 'text-emerald-600';
                } else {
                    cardStyle = 'border-4 border-amber-400 bg-amber-50 scale-105 shadow-xl z-10';
                    badge = '<span class="absolute top-2 right-2 bg-amber-500 text-white px-3 py-1 rounded-full text-xs font-bold uppercase shadow-md">Match Dudoso</span>';
                    barColor = 'bg-amber-400';
                    textColor = 'text-amber-600';
                }
            }

            return `
            <div class="glass p-4 rounded-2xl transition-all duration-300 ${cardStyle} ${item.error ? 'border-red-500 bg-red-50' : ''}">
                <div class="relative overflow-hidden rounded-xl mb-4 h-48 bg-slate-200">
                    <img src="${item.url}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400?text=Error'">
                    ${badge}
                </div>
                
                <div class="flex justify-between items-center mb-1">
                    <span class="text-xs uppercase font-bold text-slate-500">OPCIÓN ${item.index + 1}</span>
                    <span class="font-bold text-lg ${textColor}">${scoreStr}%</span>
                </div>
                
                <div class="w-full bg-slate-200 h-1.5 rounded-full mb-2 overflow-hidden">
                    <div class="${barColor} h-full" style="width: ${score * 100}%"></div>
                </div>

                ${item.caption ? `<div class="text-xs text-slate-600 bg-white/60 p-2 rounded italic font-medium">" ${item.caption} "</div>` : ''}
                ${item.error ? `<div class="text-xs font-bold text-red-500 mt-1">⚠️ ${item.error}</div>` : ''}
            </div>`;
        }).join("");

        resArea.classList.remove('hidden');

    } catch (err) {
        cajaExplicacion.classList.add('border-red-500');
        explicacion.classList.add('text-red-700');
        titulo.innerText = "Fallo del Sistema";
        explicacion.innerHTML = `❌ ${err.message}`;
        resArea.classList.remove('hidden');
    } finally {
        loader.classList.add('hidden');
        btn.disabled = false;
    }
}
</script>
</body>
</html>
